name: Build Mod Fast
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Compile and Package Mod
        run: |
          mkdir -p build/classes
          mkdir -p build/libs
          
          # Скачиваем официальные библиотеки среды разработки и сам клиент игры
          curl -Lo fabric-loader.jar https://fabricmc.net
          curl -Lo fabric-api.jar https://fabricmc.net || true
          curl -Lo minecraft.jar https://mojang.com
          
          # Находим и компилируем файлы с поддержкой библиотек игры
          find src/main/java -name "*.java" > sources.txt
          javac -d build/classes -cp "fabric-loader.jar:fabric-api.jar:minecraft.jar" @sources.txt
          
          # Копируем метаданные мода
          cp -r src/main/resources/* build/classes/ || true
          
          # Создаем финальный JAR файл мода
          jar cf build/libs/aircombat-1.0.0.jar -C build/classes .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirCombat-Mod
          path: build/libs/*.jar
