name: Build Mod Fast
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Compile and Package Mod
        run: |
          mkdir -p build/classes
          mkdir -p build/libs
          
          # Скачиваем абсолютно все библиотеки, которые требует код мода
          curl -Lo fabric-loader.jar https://fabricmc.net
          curl -Lo fabric-api.jar https://fabricmc.net || true
          curl -Lo minecraft.jar https://mojang.com
          curl -Lo lwjgl.jar https://maven.org
          curl -Lo lwjgl-glfw.jar https://maven.org
          curl -Lo joml.jar https://maven.org
          
          # Компилируем файлы, подключая весь набор библиотек игры и движка
          find src/main/java -name "*.java" > sources.txt
          javac -d build/classes -cp "fabric-loader.jar:fabric-api.jar:minecraft.jar:lwjgl.jar:lwjgl-glfw.jar:joml.jar" @sources.txt
          
          # Копируем метаданные (fabric.mod.json)
          cp -r src/main/resources/* build/classes/ || true
          
          # Создаем финальный JAR файл мода
          jar cf build/libs/aircombat-1.0.0.jar -C build/classes .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirCombat-Mod
          path: build/libs/*.jar
