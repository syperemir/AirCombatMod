name: Build Mod Fast
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Compile Java and Package JAR
        run: |
          mkdir -p build/classes
          mkdir -p build/libs
          
          # Скачиваем официальный релиз Fabric Loader для компиляции зависимостей
          curl -Lo fabric-loader.jar https://fabricmc.net
          
          # Находим все java файлы и компилируем их напрямую через JDK 25
          find src/main/java -name "*.java" > sources.txt
          javac -d build/classes -cp fabric-loader.jar @sources.txt
          
          # Копируем ресурсы (fabric.mod.json) в папку сборки
          cp -r src/main/resources/* build/classes/ || true
          
          # Упаковываем все скомпилированные файлы в готовый .jar
          jar cf build/libs/aircombat-1.0.0.jar -C build/classes .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirCombat-Mod
          path: build/libs/*.jar
